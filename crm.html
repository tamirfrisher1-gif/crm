║  STEP 2 — Run this SQL in Supabase → SQL Editor → New query     ║
║  ─────────────────────────────────────────────────────────────  ║
║  create table instructor_state (                                 ║
║    instructor_id uuid primary key,                               ║
║    name          text not null default 'מדריך',                  ║
║    state_json    jsonb not null default '{}',                    ║
║    updated_at    timestamptz default now()                       ║

║  alter table instructor_state enable row level security;         ║
║  create policy "own data" on instructor_state                    ║
║    for all using (auth.uid() = instructor_id);                   ║

║  STEP 3 — Copy your project keys:                               ║

<script>

// ============================================================

const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

const DEMO_MODE = (SUPABASE_URL === 'YOUR_SUPABASE_URL');

// Initialise Supabase client (only when keys are real)
let sb = null;
if (!DEMO_MODE) {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ============================================================

let currentUser   = null;   // Supabase user object
let S             = null;   // in-memory app state

function daysFromNow(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

// ============================================================
// ③ CLOUD SYNC
// ============================================================
function setSyncStatus(status) {
  // status: 'ok' | 'syncing' | 'error' | 'demo'
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = status === 'syncing' ? 'syncing' : status === 'error' ? 'error' : '';
  dot.title = status === 'ok'      ? 'מסונכרן בענן ✓'
            : status === 'syncing' ? 'מסנכרן...'
            : status === 'error'   ? 'שגיאת סנכרון'
            : 'מצב הדגמה — ללא ענן';
}

async function saveToCloud() {
  if (!sb || !currentUser) { setSyncStatus('demo'); return; }
  setSyncStatus('syncing');
  try {
    const { error } = await sb.from('instructor_state').upsert({
      instructor_id: currentUser.id,
      name:          S.instructor.name,
      state_json:    S,
      updated_at:    new Date().toISOString()
    });
    if (error) throw error;
    setSyncStatus('ok');
  } catch(e) {
    console.error('Supabase save error:', e);
    setSyncStatus('error');
  }
}

async function loadFromCloud() {
  if (!sb || !currentUser) return false;
  try {
    const { data, error } = await sb.from('instructor_state')
      .select('state_json, name')
      .eq('instructor_id', currentUser.id)
      .maybeSingle();
    if (error) throw error;
    if (data?.state_json) {
      S = data.state_json;
      // Ensure instructor name is up-to-date
      if (data.name) S.instructor.name = data.name;
      return true;
    }
    return false;
  } catch(e) {
    console.error('Supabase load error:', e);
    return false;
  }
}

// save() — called throughout the app; syncs async to cloud
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  saveToCloud(); // fire-and-forget
}

function genId() { return '_' + Math.random().toString(36).slice(2, 11); }

// ④ AUTH
// ============================================================
let authTab = 'login';

function switchAuthTab(tab) {
  authTab = tab;
  document.getElementById('form-login').style.display  = tab === 'login'  ? 'flex' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'flex' : 'none';
  const tl = document.getElementById('tab-login');
  const ts = document.getElementById('tab-signup');
  tl.style.background   = tab === 'login'  ? '#fff'        : 'transparent';
  tl.style.color        = tab === 'login'  ? '#2C2C1E'     : '#9CA3AF';
  tl.style.boxShadow    = tab === 'login'  ? '0 1px 3px rgba(0,0,0,.1)' : 'none';
  ts.style.background   = tab === 'signup' ? '#fff'        : 'transparent';
  ts.style.color        = tab === 'signup' ? '#2C2C1E'     : '#9CA3AF';
  ts.style.boxShadow    = tab === 'signup' ? '0 1px 3px rgba(0,0,0,.1)' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function setAuthLoading(loading) {
  const btn = authTab === 'login'
    ? document.getElementById('btn-login')
    : document.getElementById('btn-signup');
  btn.disabled    = loading;
  btn.textContent = loading ? 'טוען...' : authTab === 'login' ? 'כניסה לחשבון' : 'צור חשבון חינמי';
}

async function handleSignIn(e) {
  e.preventDefault();
  if (!sb) { enterDemoMode(); return; }
  setAuthLoading(true);
  try {
    const { data, error } = await sb.auth.signInWithPassword({
      email:    document.getElementById('li-email').value.trim(),
      password: document.getElementById('li-pass').value,
    });
    if (error) throw error;
    currentUser = data.user;
    await bootApp();
  } catch(err) {
    showAuthError(err.message === 'Invalid login credentials'
      ? 'אימייל או סיסמה שגויים' : err.message);
    setAuthLoading(false);
  }
}

async function handleSignUp(e) {
  e.preventDefault();
  if (!sb) { enterDemoMode(); return; }
  setAuthLoading(true);
  const name  = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass  = document.getElementById('su-pass').value;
  try {
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) throw error;
    currentUser = data.user;
    S = buildDefaultState(name);
    await saveToCloud();
    updateSidebarUser(name, email);
    launchApp();
  } catch(err) {
    showAuthError(err.message);
    setAuthLoading(false);
  }
}

async function handleSignOut() {
  if (sb) await sb.auth.signOut();
  currentUser = null;
  S = null;
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('setup-banner').classList.remove('visible');
  toast('יצאת מהחשבון');
}

function enterDemoMode() {
  currentUser = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    S = raw ? JSON.parse(raw) : buildDefaultState('מדריך הדגמה');
  } catch(e) { S = buildDefaultState('מדריך הדגמה'); }
  document.getElementById('setup-banner').classList.add('visible');
  updateSidebarUser(S.instructor.name, 'מצב הדגמה');
  setSyncStatus('demo');
  launchApp();
}

function updateSidebarUser(name, sub) {
  const nameEl   = document.getElementById('sidebar-name');
  const emailEl  = document.getElementById('sidebar-email');
  const avatarEl = document.getElementById('sidebar-avatar');
  if (nameEl)   nameEl.textContent   = name;
  if (emailEl)  emailEl.textContent  = sub || '';
  if (avatarEl) avatarEl.textContent = name.charAt(0);
}

function launchApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  lucide.createIcons();
  renderDashboard();
}

// Called after login — loads cloud state, then shows app
async function bootApp() {
  const loaded = await loadFromCloud();
  if (!loaded) {
    // New account — use demo data with their name
    const name = currentUser.email.split('@')[0];
    S = buildDefaultState(name);
    await saveToCloud();
  }
  const email = currentUser.email;
  updateSidebarUser(S.instructor.name, email);
  setSyncStatus('ok');
  launchApp();
}

function getStudent(id) { return S.students.find(s => s.id === id) || { name:'לא ידוע', avatar:'?', phone:'' }; }
function fmtDate(d) { if (!d) return '—'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if (m < 2)  return 'לפני רגע';
  if (m < 60) return `לפני ${m} דקות`;
  const h = Math.floor(m/60);
  if (h < 24) return `לפני ${h} שעות`;
  return `לפני ${Math.floor(h/24)} ימים`;
}
const STATUS_LABEL = { confirmed:'מאושר', pending:'ממתין', cancelled:'בוטל', done:'בוצע' };
const STATUS_BADGE_CLASS = { confirmed:'badge-confirmed', pending:'badge-pending', cancelled:'badge-cancelled', done:'badge-done' };
function statusBadge(s) { return `<span class="badge ${STATUS_BADGE_CLASS[s]||'badge-done'}">${STATUS_LABEL[s]||s}</span>`; }
const STAGE_LABEL = { new:'חדש', contacted:'יצרתי קשר', trial:'שיעור נסיון', enrolled:'נרשם', lost:'אבד' };
function addActivity(type, text) {

}

let calDate = new Date();
const DAY_NAMES  = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const TIME_SLOTS = (() => {
  const s = [];
  for (let h=7; h<=20; h++) { s.push(`${String(h).padStart(2,'0')}:00`); if(h<20) s.push(`${String(h).padStart(2,'0')}:30`); }
  return s;
})();

function getWeekDays(date) {
  const d = new Date(date); d.setDate(d.getDate()-d.getDay());
  return Array.from({length:7},(_,i)=>{ const x=new Date(d); x.setDate(d.getDate()+i); return x; });
}

function renderCalendar() {
  const weekDays = getWeekDays(calDate);
  const today    = todayStr();

  S.lessons.forEach(l => { const k=l.date+'_'+l.time; (lmap[k]=lmap[k]||[]).push(l); });

    confirmed:{ bg:'#DCFCE7', border:'#16A34A', text:'#166534' },

    }).join('');
    return `<tr>
      <td style="text-align:center;font-size:.8rem;font-weight:600;color:#9CA3AF;padding:0 10px;white-space:nowrap;background:#FAFAF8;border-bottom:1px solid #F0F0EC;">${slot}</td>

// ============================================================
const STAGES = [
  { id:'new',       label:'חדש',         hdrBg:'#DBEAFE', hdrTxt:'#1E40AF' },
  { id:'contacted', label:'יצרתי קשר',   hdrBg:'#FEF9C3', hdrTxt:'#854D0E' },
  { id:'trial',     label:'שיעור נסיון', hdrBg:'#EDE9FE', hdrTxt:'#5B21B6' },
  { id:'enrolled',  label:'נרשם ✓',      hdrBg:'#DCFCE7', hdrTxt:'#166534' },
];

function renderLeads() {
  const today = todayStr();
  const columns = STAGES.map(stage => {
    const leads = S.leads.filter(l=>l.stage===stage.id);
    const cards = leads.map(lead => {
      const overdue = lead.followUpDate && lead.followUpDate < today && stage.id !== 'enrolled';
      const dueToday = lead.followUpDate === today;
      const moveBtns = STAGES.filter(s=>s.id!==stage.id).map(s=>
        `<button onclick="moveLead('${lead.id}','${s.id}')"
          style="flex:1;font-size:.75rem;padding:5px 4px;border-radius:7px;border:none;cursor:pointer;
          font-weight:700;font-family:'Heebo',sans-serif;background:${s.hdrBg};color:${s.hdrTxt};"
          onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">${s.label}</button>`
      ).join('');
      return `<div class="kanban-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
          <div>
            <div style="font-weight:800;font-size:1rem;color:#2C2C1E;">${lead.name}</div>
            <a href="tel:${lead.phone}" style="font-size:.875rem;color:#4A7C59;font-weight:600;text-decoration:none;">${lead.phone}</a>
          </div>
          <div style="display:flex;gap:3px;flex-shrink:0;">
            <button onclick="editLead('${lead.id}')" style="padding:5px;border-radius:7px;border:none;background:transparent;cursor:pointer;color:#9CA3AF;" onmouseover="this.style.background='#F3F4F6'" onmouseout="this.style.background='transparent'">
              <i data-lucide="pencil" style="width:14px;height:14px;display:block;"></i>
            </button>
            <button onclick="deleteLead('${lead.id}')" style="padding:5px;border-radius:7px;border:none;background:transparent;cursor:pointer;color:#EF4444;" onmouseover="this.style.background='#FEE2E2'" onmouseout="this.style.background='transparent'">
              <i data-lucide="trash-2" style="width:14px;height:14px;display:block;"></i>
            </button>
          </div>
        </div>
        ${lead.source?`<span style="font-size:.75rem;background:#F3F4F6;color:#6B7280;padding:2px 8px;border-radius:999px;font-weight:600;">${lead.source}</span>`:''}
        ${lead.notes?`<p style="font-size:.83rem;color:#6B7280;margin-top:7px;line-height:1.4;">${lead.notes}</p>`:''}
        ${lead.followUpDate?`<div style="display:flex;align-items:center;gap:5px;margin-top:8px;">
          <i data-lucide="clock" style="width:13px;height:13px;color:${overdue?'#DC2626':dueToday?'#D97706':'#9CA3AF'};"></i>
          <span style="font-size:.78rem;font-weight:700;color:${overdue?'#DC2626':dueToday?'#D97706':'#9CA3AF'};">
            מעקב: ${fmtDate(lead.followUpDate)}${overdue?' ⚠️':''}</span>
        </div>`:''}
        <div style="display:flex;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid #F3F4F6;">${moveBtns}</div>
      </div>`;
    }).join('') || `<div style="text-align:center;padding:28px 16px;color:#9CA3AF;font-size:.875rem;">אין לידים</div>`;
    return `<div class="kanban-col">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="background:${stage.hdrBg};color:${stage.hdrTxt};font-weight:800;font-size:.875rem;padding:5px 12px;border-radius:10px;">${stage.label}</span>
        <span style="font-size:.85rem;color:#9CA3AF;font-weight:600;">${leads.length}</span>
      </div>
      ${cards}
    </div>`;
  }).join('');

  document.getElementById('leads-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h1 style="font-size:2rem;font-weight:800;color:#2C2C1E;">לידים</h1>
      <button onclick="openAddLeadModal()" class="btn-primary"><i data-lucide="plus" style="width:16px;height:16px;"></i> ליד חדש</button>
    </div>
    <div style="display:flex;gap:18px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;">${columns}</div>
  `;
  lucide.createIcons();
}

  const stageOpts=[...STAGES,{id:'lost',label:'אבד'}].map(s=>`<option value="${s.id}" ${l.stage===s.id?'selected':''}>${s.label}</option>`).join('');
  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
      <h2 style="font-size:1.4rem;font-weight:800;color:#2C2C1E;">ערוך ליד</h2>
      <button onclick="closeModal()" style="padding:6px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;"><i data-lucide="x" style="width:16px;height:16px;display:block;"></i></button>
    </div>
    <form onsubmit="submitEditLead(event,'${id}')" style="display:flex;flex-direction:column;gap:16px;">
      <div><label class="field-label">שם מלא</label><input id="el2-name" type="text" required value="${l.name}" class="field-input"></div>
      <div><label class="field-label">טלפון</label><input id="el2-phone" type="tel" required value="${l.phone}" class="field-input"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label class="field-label">מקור</label><select id="el2-src" class="field-input">${srcOpts}</select></div>
        <div><label class="field-label">שלב</label><select id="el2-stage" class="field-input">${stageOpts}</select></div>
      </div>
      <div><label class="field-label">תאריך מעקב</label><input id="el2-fu" type="date" value="${l.followUpDate||''}" class="field-input"></div>
      <div><label class="field-label">הערות</label><textarea id="el2-notes" rows="3" class="field-input" style="resize:none;">${l.notes||''}</textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button type="submit" class="btn-primary" style="flex:1;justify-content:center;font-size:1rem;padding:13px;">שמור</button>
        <button type="button" onclick="closeModal()" class="btn-ghost" style="flex:1;justify-content:center;font-size:1rem;padding:13px;">ביטול</button>
      </div>
    </form>
  `);
}
function submitEditLead(e,id) {
  e.preventDefault();
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  l.name=document.getElementById('el2-name').value; l.phone=document.getElementById('el2-phone').value;
  l.source=document.getElementById('el2-src').value; l.stage=document.getElementById('el2-stage').value;
  l.followUpDate=document.getElementById('el2-fu').value; l.notes=document.getElementById('el2-notes').value;
  save(); closeModal(); toast('הליד עודכן ✓'); renderPage(currentPage);
}
function moveLead(id,stage) {
  const l=S.leads.find(x=>x.id===id); if(!l) return;
  l.stage=stage; addActivity('lead',`${l.name} עבר ל"${STAGE_LABEL[stage]}"`);
  save(); toast(`עבר ל"${STAGE_LABEL[stage]}" ✓`); renderLeads();
}
function deleteLead(id) {
  if(!confirm('למחוק ליד זה?')) return;
  S.leads=S.leads.filter(l=>l.id!==id); save(); toast('הליד נמחק'); renderPage(currentPage);
}

// ============================================================
// STUDENTS
// ============================================================
function renderStudents() {
  const cards = S.students.map(s => {
    const allL=S.lessons.filter(l=>l.studentId===s.id);
    const done=allL.filter(l=>l.status==='done').length;
    const upcoming=allL.filter(l=>l.date>=todayStr()&&l.status==='confirmed').length;
    return `<div onclick="openStudentProfile('${s.id}')"
      style="background:#fff;border-radius:20px;border:1px solid #EBEBEB;box-shadow:0 1px 4px rgba(0,0,0,.04);
        padding:22px;cursor:pointer;transition:box-shadow .15s;"
      onmouseover="this.style.boxShadow='0 6px 20px rgba(0,0,0,.1)'"
      onmouseout="this.style.boxShadow='0 1px 4px rgba(0,0,0,.04)'">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;">
        <div class="avatar-circle" style="width:52px;height:52px;font-size:1.4rem;border-radius:16px;">${s.avatar}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:1.15rem;font-weight:800;color:#2C2C1E;">${s.name}</div>
          <div style="font-size:.875rem;color:#4A7C59;font-weight:600;margin-top:2px;">${s.phone}</div>
          <span style="font-size:.75rem;background:#E8F0EB;color:#4A7C59;padding:2px 8px;border-radius:999px;font-weight:700;display:inline-block;margin-top:5px;">רישיון ${s.licenseType}</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px;border-top:1px solid #F5F5F0;">
        <div style="text-align:center;background:#F8F7F4;border-radius:12px;padding:10px;">
          <div style="font-size:1.6rem;font-weight:800;color:#2C2C1E;">${done}</div>
          <div style="font-size:.75rem;color:#9CA3AF;font-weight:600;">שיעורים הושלמו</div>
        </div>
        <div style="text-align:center;background:#E8F0EB;border-radius:12px;padding:10px;">
          <div style="font-size:1.6rem;font-weight:800;color:#4A7C59;">${upcoming}</div>
          <div style="font-size:.75rem;color:#4A7C59;font-weight:600;">שיעורים קרובים</div>
        </div>
      </div>
      ${s.notes?`<div style="margin-top:10px;font-size:.8rem;color:#9CA3AF;border-top:1px solid #F5F5F0;padding-top:9px;line-height:1.4;">${s.notes}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('students-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h1 style="font-size:2rem;font-weight:800;color:#2C2C1E;">תלמידים</h1>
      <button onclick="openAddStudentModal()" class="btn-primary"><i data-lucide="user-plus" style="width:16px;height:16px;"></i> תלמיד חדש</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">
      ${cards||`<div style="grid-column:1/-1;text-align:center;padding:60px;color:#9CA3AF;">אין תלמידים רשומים</div>`}
    </div>
  `;
  lucide.createIcons();
}

function openStudentProfile(id) {
  const s=S.students.find(x=>x.id===id); if(!s) return;
  const lessons=S.lessons.filter(l=>l.studentId===id).sort((a,b)=>(b.date+b.time)>(a.date+a.time)?1:-1);
  const histHTML = lessons.slice(0,10).map(l=>`
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F5F5F0;">
      <div style="font-size:.83rem;font-weight:600;color:#6B7280;white-space:nowrap;min-width:110px;">${fmtDate(l.date)} ${l.time}</div>
      <div style="flex:1;font-size:.875rem;color:#2C2C1E;">${l.notes||'—'}</div>
      <div>${statusBadge(l.status)}</div>
    </div>`).join('') || `<div style="text-align:center;padding:20px;color:#9CA3AF;font-size:.875rem;">אין שיעורים רשומים</div>`;

  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <h2 style="font-size:1.4rem;font-weight:800;color:#2C2C1E;">פרופיל תלמיד</h2>
      <button onclick="closeModal()" style="padding:6px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;"><i data-lucide="x" style="width:16px;height:16px;display:block;"></i></button>
    </div>
    <div style="background:#E8F0EB;border-radius:16px;padding:18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <div class="avatar-circle" style="width:60px;height:60px;font-size:1.7rem;background:#4A7C59;color:#fff;border-radius:18px;">${s.avatar}</div>
      <div>
        <div style="font-size:1.3rem;font-weight:800;color:#2C2C1E;">${s.name}</div>
        <div style="color:#4A7C59;font-weight:600;font-size:.95rem;">${s.phone}</div>
        ${s.email?`<div style="font-size:.83rem;color:#6B7280;">${s.email}</div>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="background:#F8F7F4;border-radius:12px;padding:12px 14px;">
        <div style="font-size:.75rem;color:#9CA3AF;font-weight:700;margin-bottom:3px;">סוג רישיון</div>
        <div style="font-weight:800;font-size:1.1rem;color:#2C2C1E;">רישיון ${s.licenseType}</div>
      </div>
      <div style="background:#F8F7F4;border-radius:12px;padding:12px 14px;">
        <div style="font-size:.75rem;color:#9CA3AF;font-weight:700;margin-bottom:3px;">תאריך התחלה</div>
        <div style="font-weight:800;font-size:1.1rem;color:#2C2C1E;">${s.startDate?fmtDate(s.startDate):'—'}</div>
      </div>
    </div>
    ${s.notes?`<div style="background:#FFFBEB;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:.875rem;color:#2C2C1E;border:1px solid #FDE68A;"><strong>הערות:</strong> ${s.notes}</div>`:''}
    <div style="margin-bottom:16px;">
      <div style="font-weight:800;font-size:.95rem;color:#2C2C1E;margin-bottom:8px;">היסטוריית שיעורים (${lessons.length})</div>
      <div style="background:#F8F7F4;border-radius:12px;padding:4px 14px;max-height:180px;overflow-y:auto;">${histHTML}</div>
    </div>
    <div style="border:2px dashed #D1D5DB;border-radius:14px;padding:20px;text-align:center;margin-bottom:18px;">
      <i data-lucide="paperclip" style="width:28px;height:28px;color:#9CA3AF;margin:0 auto 8px;display:block;"></i>
      <div style="font-weight:700;color:#2C2C1E;margin-bottom:4px;font-size:.95rem;">שלח מסמך לתלמיד</div>
      <div style="font-size:.8rem;color:#9CA3AF;margin-bottom:12px;">PDF, תמונה, או כל קובץ</div>
      <label style="cursor:pointer;display:inline-block;">
        <span class="btn-primary" style="font-size:.875rem;padding:9px 18px;">בחר קובץ</span>
        <input type="file" style="display:none;" onchange="handleDocUpload(event,'${id}')">
      </label>
      ${s.docName?`<div style="margin-top:8px;font-size:.83rem;color:#4A7C59;font-weight:700;">✓ ${s.docName}</div>`:''}
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeModal();setTimeout(()=>openEditStudentModal('${id}'),50)" class="btn-ghost" style="flex:1;justify-content:center;font-size:.95rem;padding:12px;">
        <i data-lucide="pencil" style="width:15px;height:15px;"></i> ערוך פרטים
      </button>
      <button onclick="deleteStudent('${id}')"
        style="padding:12px 16px;border-radius:12px;border:2px solid #FCA5A5;color:#DC2626;background:transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;font-size:.95rem;"
        onmouseover="this.style.background='#FEF2F2'" onmouseout="this.style.background='transparent'">מחק</button>
    </div>
  `);
}

function handleDocUpload(e,id) {
  const file=e.target.files[0]; if(!file) return;
  const s=S.students.find(x=>x.id===id); if(!s) return;
  s.docName=file.name; save(); toast(`"${file.name}" נשמר ✓`);
  closeModal(); setTimeout(()=>openStudentProfile(id),80);
}

function openAddStudentModal() {
  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
      <h2 style="font-size:1.4rem;font-weight:800;color:#2C2C1E;">תלמיד חדש</h2>
      <button onclick="closeModal()" style="padding:6px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;"><i data-lucide="x" style="width:16px;height:16px;display:block;"></i></button>
    </div>
    <form onsubmit="submitAddStudent(event)" style="display:flex;flex-direction:column;gap:16px;">
      <div><label class="field-label">שם מלא *</label><input id="sf-name" type="text" required placeholder="שם ומשפחה" class="field-input"></div>
      <div><label class="field-label">טלפון *</label><input id="sf-phone" type="tel" required placeholder="050-0000000" class="field-input"></div>
      <div><label class="field-label">אימייל</label><input id="sf-email" type="email" placeholder="email@example.com" class="field-input"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label class="field-label">סוג רישיון</label>
          <select id="sf-lic" class="field-input"><option>B</option><option>A</option><option>A1</option><option>C</option><option>D</option></select></div>
        <div><label class="field-label">תאריך התחלה</label><input id="sf-start" type="date" value="${todayStr()}" class="field-input"></div>
      </div>
      <div><label class="field-label">הערות</label><textarea id="sf-notes" rows="3" placeholder="הערות..." class="field-input" style="resize:none;"></textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button type="submit" class="btn-primary" style="flex:1;justify-content:center;font-size:1rem;padding:13px;">הוסף תלמיד</button>
        <button type="button" onclick="closeModal()" class="btn-ghost" style="flex:1;justify-content:center;font-size:1rem;padding:13px;">ביטול</button>
      </div>
    </form>
  `);
}
function submitAddStudent(e) {
  e.preventDefault();
  const name=document.getElementById('sf-name').value.trim();
  S.students.push({ id:genId(), name, phone:document.getElementById('sf-phone').value,
    email:document.getElementById('sf-email').value, licenseType:document.getElementById('sf-lic').value,
    startDate:document.getElementById('sf-start').value, notes:document.getElementById('sf-notes').value,
    avatar:name.charAt(0), docName:'' });
  addActivity('student', `תלמיד חדש: ${name}`);
  save(); closeModal(); toast('התלמיד נוסף ✓'); renderPage(currentPage);
}

function openEditStudentModal(id) {
  const s=S.students.find(x=>x.id===id); if(!s) return;
  const licOpts=['B','A','A1','C','D'].map(l=>`<option ${s.licenseType===l?'selected':''}>${l}</option>`).join('');
  openModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
      <h2 style="font-size:1.4rem;font-weight:800;color:#2C2C1E;">ערוך תלמיד</h2>
      <button onclick="closeModal()" style="padding:6px;border-radius:8px;border:none;background:#F3F4F6;cursor:pointer;"><i data-lucide="x" style="width:16px;height:16px;display:block;"></i></button>
    </div>
    <form onsubmit="submitEditStudent(event,'${id}')" style="display:flex;flex-direction:column;gap:16px;">
      <div><label class="field-label">שם מלא</label><input id="esf-name" type="text" required value="${s.name}" class="field-input"></div>
      <div><label class="field-label">טלפון</label><input id="esf-phone" type="tel" required value="${s.phone}" class="field-input"></div>
      <div><label class="field-label">אימייל</label><input id="esf-email" type="email" value="${s.email||''}" class="field-input"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label class="field-label">סוג רישיון</label><select id="esf-lic" class="field-input">${licOpts}</select></div>
        <div><label class="field-label">תאריך התחלה</label><input id="esf-start" type="date" value="${s.startDate||''}" class="field-input"></div>
      </div>
      <div><label class="field-label">הערות</label><textarea id="esf-notes" rows="3" class="field-input" style="resize:none;">${s.notes||''}</textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button type="submit" class="btn-primary" style="flex:1;justify-content:center;font-size:1rem;padding:13px;">שמור</button>
        <button type="button" onclick="closeModal()" class="btn-ghost" style="flex:1;justify-content:center;font-size:1rem;padding:13px;">ביטול</button>
      </div>
    </form>
  `);
}
function submitEditStudent(e,id) {
  e.preventDefault();
  const s=S.students.find(x=>x.id===id); if(!s) return;
  s.name=document.getElementById('esf-name').value.trim(); s.phone=document.getElementById('esf-phone').value;
  s.email=document.getElementById('esf-email').value; s.licenseType=document.getElementById('esf-lic').value;
  s.startDate=document.getElementById('esf-start').value; s.notes=document.getElementById('esf-notes').value;
  s.avatar=s.name.charAt(0);
  save(); closeModal(); toast('פרטי התלמיד עודכנו ✓'); renderPage(currentPage);
}
function deleteStudent(id) {
  if(!confirm('למחוק תלמיד זה?')) return;
  S.students=S.students.filter(s=>s.id!==id); save(); closeModal(); toast('התלמיד נמחק'); renderPage(currentPage);
}

// ============================================================
// ⑥ BOOT — check for existing Supabase session on page load
// ============================================================
(async function boot() {
  lucide.createIcons();

  if (DEMO_MODE) {
    // No Supabase keys — go straight to demo
    enterDemoMode();
    return;
  }

  // Check for an existing session (persisted by Supabase in localStorage)
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await bootApp();
  }
  // else: auth screen remains visible, user must log in
})();
</script>
</body>
</html>
